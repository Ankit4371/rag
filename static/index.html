<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG | ArXiv Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>ArXiv Explorer</h1>
            <p class="subtitle">An intelligent agent querying the bleeding edge of AI research.</p>
            <div class="corpus-badge">
                <span class="pulse-dot"></span>
                Corpus: Machine Learning, Computation & Language, and AI papers from arXiv (2023-2026).
            </div>
        </header>

        <main>
            <form id="search-form" class="search-box">
                <input type="text" id="query-input" placeholder="Ask anything about reinforcement learning, transformers, or recent AI research..." required autocomplete="off">
                <button type="submit" id="search-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </form>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Retrieving and reasoning...</p>
            </div>

            <div id="results" class="hidden">
                <div class="answer-card glass-panel">
                    <h3>AI Synthesis</h3>
                    <div id="answer-text"></div>
                    <div class="latency" id="latency-text"></div>
                </div>

                <div class="sources-container">
                    <h3>Retrieved Sources</h3>
                    <div id="sources-grid" class="sources-grid">
                        <!-- Sources injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('search-form');
        const queryInput = document.getElementById('query-input');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const answerText = document.getElementById('answer-text');
        const latencyText = document.getElementById('latency-text');
        const sourcesGrid = document.getElementById('sources-grid');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = queryInput.value.trim();
            if (!query) return;

            // Show loading
            results.classList.add('hidden');
            loading.classList.remove('hidden');
            
            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                
                const data = await response.json();
                
                // Populate Answer
                answerText.innerHTML = data.answer.replace(/\n/g, '<br>');
                latencyText.textContent = `Generated in ${data.latency_ms}ms using Hybrid Retrieval + Cross-Encoder`;
                
                // Populate Sources
                sourcesGrid.innerHTML = '';
                if (data.sources && data.sources.length > 0) {
                    data.sources.forEach((source, index) => {
                        const card = document.createElement('div');
                        card.className = 'source-card glass-panel fade-in';
                        card.style.animationDelay = `${index * 0.1}s`;
                        
                        card.innerHTML = `
                            <div class="source-badge">Rank ${index + 1}</div>
                            <h4>${source.title || 'Unknown Title'}</h4>
                            <div class="source-meta">
                                <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> ${source.year || 'Unknown'}</span>
                                <a href="https://arxiv.org/abs/${source.arxiv_id}" target="_blank" rel="noopener noreferrer">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                                    ${source.arxiv_id || 'N/A'}
                                </a>
                            </div>
                        `;
                        sourcesGrid.appendChild(card);
                    });
                } else {
                    sourcesGrid.innerHTML = '<p>No specific sources retrieved.</p>';
                }
                
                loading.classList.add('hidden');
                results.classList.remove('hidden');
                
            } catch (err) {
                console.error(err);
                answerText.innerHTML = `<span style="color: #ff6b6b">Error generating response. Please ensure the server is running.</span>`;
                loading.classList.add('hidden');
                results.classList.remove('hidden');
                sourcesGrid.innerHTML = '';
            }
        });
    </script>
</body>
</html>
