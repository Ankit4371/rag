<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG | ArXiv Explorer</title>
    <meta name="description" content="An intelligent AI agent querying the bleeding edge of AI research papers from ArXiv.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>ArXiv Explorer</h1>
            <p class="subtitle">An intelligent agent querying the bleeding edge of AI research.</p>
            <div class="corpus-badge">
                <span class="pulse-dot"></span>
                Corpus: 15,000+ ML, NLP & AI papers from arXiv
            </div>
        </header>

        <main>
            <form id="search-form" class="search-box">
                <input type="text" id="query-input" placeholder="Ask anything about reinforcement learning, transformers, or recent AI research..." required autocomplete="off">
                <button type="submit" id="search-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </form>
            
            <div class="pipeline-options">
                <label class="switch-wrapper" title="Paused: Local BM25 index is not synced with Qdrant Cloud corpus. Code retained for future native cloud-hybrid implementations.">
                    <input type="checkbox" id="toggle-hybrid" disabled>
                    <span class="switch" style="opacity: 0.4;"></span>
                    <span class="label" style="opacity: 0.4; text-decoration: line-through;">Hybrid Retrieval (BM25)</span>
                </label>
                <label class="switch-wrapper">
                    <input type="checkbox" id="toggle-reranker" checked>
                    <span class="switch"></span>
                    <span class="label">Cross-Encoder Reranker</span>
                </label>
                <label class="switch-wrapper">
                    <input type="checkbox" id="toggle-compression">
                    <span class="switch"></span>
                    <span class="label">Context Compression</span>
                </label>
                <label class="switch-wrapper">
                    <input type="checkbox" id="toggle-hyde">
                    <span class="switch"></span>
                    <span class="label">HyDE</span>
                </label>
                <label class="switch-wrapper">
                    <input type="checkbox" id="toggle-multi-query">
                    <span class="switch"></span>
                    <span class="label">Multi-Query</span>
                </label>
                <label class="switch-wrapper">
                    <input type="checkbox" id="toggle-crag">
                    <span class="switch"></span>
                    <span class="label">CRAG + Web</span>
                </label>
                <label class="switch-wrapper">
                    <input type="checkbox" id="toggle-guards">
                    <span class="switch"></span>
                    <span class="label">Safety Guardrails</span>
                </label>
                <label class="switch-wrapper">
                    <input type="checkbox" id="toggle-cache" checked>
                    <span class="switch"></span>
                    <span class="label">Exact Cache</span>
                </label>
                <span class="options-divider"></span>
                <label class="switch-wrapper">
                    <input type="checkbox" id="toggle-trace">
                    <span class="switch"></span>
                    <span class="label">Show Pipeline Trace</span>
                </label>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Retrieving and reasoning...</p>
            </div>

            <div id="results" class="hidden">

                <!-- Pipeline Trace -->
                <div class="trace-section hidden" id="trace-section">
                    <h3 class="section-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                        Pipeline Trace
                    </h3>
                    <div class="trace-timeline" id="trace-timeline">
                        <!-- Trace steps injected here -->
                    </div>
                </div>

                <!-- AI Answer -->
                <div class="answer-card glass-panel">
                    <h3 class="section-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        AI Synthesis
                    </h3>
                    <div id="answer-text"></div>
                    <div class="latency" id="latency-text"></div>
                </div>

                <!-- Sources -->
                <div class="sources-container">
                    <h3 class="section-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        Retrieved Sources
                    </h3>
                    <div id="sources-grid" class="sources-grid">
                        <!-- Sources injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('search-form');
        const queryInput = document.getElementById('query-input');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const answerText = document.getElementById('answer-text');
        const latencyText = document.getElementById('latency-text');
        const sourcesGrid = document.getElementById('sources-grid');
        const traceTimeline = document.getElementById('trace-timeline');

        // SVG icons for each pipeline step
        const traceIcons = {
            embed: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v8"></path><path d="M8 12h8"></path></svg>',
            search: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>',
            rerank: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>',
            compress: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"></polyline><polyline points="20 10 14 10 14 4"></polyline><line x1="14" y1="10" x2="21" y2="3"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>',
            generate: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>',
            rewrite: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>',
            crag: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>',
            shield: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>'
        };

        // Lightweight markdown-to-HTML renderer (no external deps)
        function renderMarkdown(text) {
            if (!text) return '';
            let html = text
                // Escape HTML
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                // Headers: ### h3, ## h2 (must come before bold)
                .replace(/^####\s+(.+)$/gm, '<h4 style="font-size:1rem;color:#e2e8f0;margin:1rem 0 0.5rem;">$1</h4>')
                .replace(/^###\s+(.+)$/gm, '<h4 style="font-size:1.05rem;color:#e2e8f0;margin:1rem 0 0.5rem;">$1</h4>')
                .replace(/^##\s+(.+)$/gm, '<h3 style="font-size:1.1rem;color:var(--accent);margin:1.2rem 0 0.5rem;">$1</h3>')
                // Bold: **text**
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                // Italic: *text* (not inside bold)
                .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
                // Inline code: `code`
                .replace(/`(.+?)`/g, '<code style="background:rgba(59,130,246,0.15);padding:0.1em 0.4em;border-radius:4px;font-size:0.9em;">$1</code>')
                // Citation highlights: [Source N]
                .replace(/\[Source\s*(\d+)\]/g, '<span class="citation">[Source $1]</span>')
                // Numbered lists: 1. item
                .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
                // Bullet lists: lines starting with - or *
                .replace(/^[\-\*]\s+(.+)$/gm, '<li>$1</li>')
                // Wrap consecutive <li> in <ul>
                .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
                // Paragraphs: double newlines
                .replace(/\n\n+/g, '</p><p>')
                // Single newlines
                .replace(/\n/g, '<br>');
            return '<p>' + html + '</p>';
        }

        function renderTrace(trace) {
            traceTimeline.innerHTML = '';
            trace.forEach((step, i) => {
                const isSkipped = step.description.includes('Skipped');
                const node = document.createElement('div');
                node.className = `trace-node ${isSkipped ? 'skipped' : 'active'} fade-in`;
                node.style.animationDelay = `${i * 0.12}s`;

                const icon = traceIcons[step.icon] || traceIcons['search'];

                // Build expandable doc list if available
                let docsHtml = '';
                if (step.docs && step.docs.length > 0 && !isSkipped) {
                    const docItems = step.docs.map((d, idx) => 
                        `<li>${idx + 1}. ${d.title}</li>`
                    ).join('');
                    docsHtml = `
                        <details class="trace-docs">
                            <summary>${step.docs.length} documents</summary>
                            <ol>${docItems}</ol>
                        </details>
                    `;
                }

                node.innerHTML = `
                    <div class="trace-icon">${icon}</div>
                    <div class="trace-content">
                        <div class="trace-header">
                            <span class="trace-step-name">${step.step}</span>
                            <span class="trace-duration ${isSkipped ? 'skipped-badge' : ''}">${isSkipped ? 'SKIPPED' : step.duration_ms + 'ms'}</span>
                        </div>
                        <p class="trace-desc">${step.description}</p>
                        ${docsHtml}
                    </div>
                `;
                traceTimeline.appendChild(node);

                // Add connector line between nodes (except last)
                if (i < trace.length - 1) {
                    const connector = document.createElement('div');
                    connector.className = 'trace-connector fade-in';
                    connector.style.animationDelay = `${i * 0.12 + 0.06}s`;
                    traceTimeline.appendChild(connector);
                }
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = queryInput.value.trim();
            if (!query) return;

            // Show loading
            results.classList.add('hidden');
            loading.classList.remove('hidden');
            
            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        query,
                        use_hybrid: document.getElementById('toggle-hybrid').checked,
                        use_reranker: document.getElementById('toggle-reranker').checked,
                        use_compression: document.getElementById('toggle-compression').checked,
                        use_hyde: document.getElementById('toggle-hyde').checked,
                        use_multi_query: document.getElementById('toggle-multi-query').checked,
                        use_crag: document.getElementById('toggle-crag').checked,
                        use_guards: document.getElementById('toggle-guards').checked,
                        use_cache: document.getElementById('toggle-cache').checked
                    })
                });
                
                const data = await response.json();
                
                // 1. Render Pipeline Trace
                const traceSection = document.getElementById('trace-section');
                const showTrace = document.getElementById('toggle-trace').checked;
                if (showTrace && data.trace && data.trace.length > 0) {
                    renderTrace(data.trace);
                    traceSection.classList.remove('hidden');
                } else {
                    traceSection.classList.add('hidden');
                }

                // 2. Populate Answer
                answerText.innerHTML = renderMarkdown(data.answer);
                
                const usedReranker = document.getElementById('toggle-reranker').checked;
                const usedCompression = document.getElementById('toggle-compression').checked;
                const usedHyde = document.getElementById('toggle-hyde').checked;
                const usedMultiQuery = document.getElementById('toggle-multi-query').checked;
                const usedCrag = document.getElementById('toggle-crag').checked;
                const usedGuards = document.getElementById('toggle-guards').checked;
                const usedCache = document.getElementById('toggle-cache').checked;
                
                let pipelinePath = [];
                if (data.cached) pipelinePath.push("CACHE HIT");
                if (usedGuards) pipelinePath.push("Safety");
                if (usedHyde || usedMultiQuery) {
                    let rw = [];
                    if (usedHyde) rw.push("HyDE");
                    if (usedMultiQuery) rw.push("Multi-Query");
                    pipelinePath.push(rw.join("+"));
                }
                pipelinePath.push("Dense Retrieval");
                if (usedReranker) pipelinePath.push("Reranker");
                if (usedCrag) pipelinePath.push("CRAG");
                if (usedCompression) pipelinePath.push("Compression");
                if (usedGuards) pipelinePath.push("Verification");
                
                let costStr = data.cost ? ` | Est. Cost: $${data.cost.estimated_cost_usd}` : '';
                latencyText.textContent = `Generated in ${data.latency_ms}ms using ${pipelinePath.join(' → ')}${costStr}`;
                
                // 3. Populate Sources
                sourcesGrid.innerHTML = '';
                if (data.sources && data.sources.length > 0) {
                    data.sources.forEach((source, index) => {
                        const card = document.createElement('div');
                        card.className = 'source-card glass-panel fade-in';
                        card.style.animationDelay = `${index * 0.1}s`;
                        
                        const title = source.title || 'Untitled Paper';
                        let arxivLink = source.arxiv_id && source.arxiv_id !== 'N/A' 
                            ? `https://arxiv.org/abs/${source.arxiv_id}` 
                            : `https://arxiv.org/search/?query=${encodeURIComponent(title)}&searchtype=title`;
                        let arxivText = source.arxiv_id && source.arxiv_id !== 'N/A' ? source.arxiv_id : 'Search ArXiv';
                        
                        // Build meta items, only show year if it exists
                        let metaHtml = '';
                        if (source.year) {
                            metaHtml += `<span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> ${source.year}</span>`;
                        }
                        metaHtml += `
                            <a href="${arxivLink}" target="_blank" rel="noopener noreferrer">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                                ${arxivText}
                            </a>
                        `;

                        card.innerHTML = `
                            <div class="source-badge">Rank ${index + 1}</div>
                            <h4>${title}</h4>
                            <div class="source-meta">${metaHtml}</div>
                        `;
                        sourcesGrid.appendChild(card);
                    });
                } else {
                    sourcesGrid.innerHTML = '<p>No specific sources retrieved.</p>';
                }
                
                loading.classList.add('hidden');
                results.classList.remove('hidden');
                
            } catch (err) {
                console.error(err);
                answerText.innerHTML = `<span style="color: #ff6b6b">Error generating response. Please ensure the server is running.</span>`;
                loading.classList.add('hidden');
                results.classList.remove('hidden');
                sourcesGrid.innerHTML = '';
                traceTimeline.innerHTML = '';
            }
        });
    </script>
</body>
</html>
